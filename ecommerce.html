    <!DOCTYPE html>
    <html>
    <head>
    <title>E-Commerce - High Tech Solutions</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
    body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background:#fff0f7;
    }

    .header{
    background:white;
    padding:20px 50px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    }

    .logo{
    font-size:24px;
    font-weight:800;
    color:#ff1493;
    }

    .hero{
    text-align:center;
    padding:80px 20px;
    }

    .hero h1{
    font-size:42px;
    color:#ff1493;
    margin-bottom:20px;
    }

    .hero p{
    max-width:700px;
    margin:auto;
    font-size:18px;
    }

    .images{
    display:flex;
    justify-content:center;
    gap:30px;
    margin-top:50px;
    flex-wrap:wrap;
    }

    .images img{
    width:300px;
    height:200px;
    object-fit:cover;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
    transition:0.3s;
    }

    .images img:hover{
    transform:scale(1.07);
    }

    .buttons{
    margin-top:50px;
    }

    .buttons a{
    display:inline-block;
    padding:12px 25px;
    margin:10px;
    border-radius:30px;
    text-decoration:none;
    font-weight:600;
    background:#ff1493;
    color:white;
    transition:0.3s;
    }

    .buttons a:hover{
    background:#d8127f;
    }

    </style>
    </head>

    <body>

    <div class="header">
    <div class="logo">HIGH TECH SOLUTIONS</div>
    <a href="index.html" style="text-decoration:none;color:#ff1493;font-weight:600;">Back to Home</a>
    </div>

    <div class="hero">
    <h1>Advanced E-Commerce Platforms</h1>
    <p>We build scalable online stores, payment gateway integrations, and AI-driven customer experience systems for global brands.</p>

    <div class="images">
    <img src="ecommerce1.jpg">
    <img src="ecommerce2.jpg">
    <img src="ecommerce3.jpg">
    </div>

    <div class="buttons">
    <a href="contact.html">Start Your Online Store</a>
    <a href="#">View Portfolio</a>
    </div>

    </div>

    </body>
    </html>
